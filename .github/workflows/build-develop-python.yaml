name: Build and release (develop)

on:
    push:
        branches: [ "develop" ]

    workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Compile with pyinstaller"
        run: |
          pyinstaller build.spec

      - name: "Publish develop build"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete develop --yes --cleanup-tag || echo "no existing develop release"
          gh release create develop --prerelease --title "Develop Build" --target develop --notes "Automated develop build from ${{ github.sha }}" LICENSE.TXT (Get-Item *.zip)
        shell: pwsh
